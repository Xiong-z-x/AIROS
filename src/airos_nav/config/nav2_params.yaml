amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: /scan
    robot_model_type: nav2_amcl::DifferentialMotionModel
    laser_model_type: likelihood_field
    laser_max_range: 12.0
    laser_min_range: 0.08
    max_beams: 80
    min_particles: 400
    max_particles: 1600
    update_min_d: 0.12
    update_min_a: 0.12
    transform_tolerance: 0.5
    resample_interval: 1
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
