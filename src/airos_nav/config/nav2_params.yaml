bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: true
bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: true
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.0
    progress_checker_plugin: progress_checker
    goal_checker_plugins:
    - general_goal_checker
    controller_plugins:
    - FollowPath
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.18
      movement_time_allowance: 25.0
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.35
    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 32
      model_dt: 0.1
      batch_size: 1200
      vx_std: 0.12
      vy_std: 0.0
      wz_std: 0.22
      vx_max: 0.24
      vx_min: 0.0
      vy_max: 0.0
      wz_max: 0.55
      iteration_count: 1
      prune_distance: 1.5
      transform_tolerance: 0.2
      temperature: 0.35
      gamma: 0.015
      motion_model: DiffDrive
      visualize: false
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.45
      critics:
      - ConstraintCritic
      - CostCritic
      - GoalCritic
      - GoalAngleCritic
      - PathAlignCritic
      - PathFollowCritic
      - PreferForwardCritic
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.7
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        threshold_to_consider: 0.8
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        max_path_occupancy_ratio: 0.2
        trajectory_point_step: 4
        threshold_to_consider: 1.0
        offset_from_furthest: 10
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 0.8
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 0.4
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      footprint: '[[0.43, 0.29], [0.43, -0.29], [-0.43, -0.29], [-0.43, 0.29]]'
      plugins:
      - obstacle_layer
      - inflation_layer
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_min_range: 0.08
          obstacle_max_range: 4.5
          raytrace_min_range: 0.08
          raytrace_max_range: 5.5
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.42
        cost_scaling_factor: 4.0
      always_send_full_costmap: true
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      track_unknown_space: false
      footprint: '[[0.43, 0.29], [0.43, -0.29], [-0.43, -0.29], [-0.43, 0.29]]'
      plugins:
      - static_layer
      - obstacle_layer
      - inflation_layer
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_min_range: 0.08
          obstacle_max_range: 4.5
          raytrace_min_range: 0.08
          raytrace_max_range: 5.5
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.48
        cost_scaling_factor: 4.0
      always_send_full_costmap: true
map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ''
map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins:
    - GridBased
    GridBased:
      plugin: nav2_smac_planner/SmacPlanner2D
      tolerance: 0.25
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 100000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 1.2
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.35
        w_data: 0.25
        tolerance: 1.0e-10
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins:
    - simple_smoother
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.2
    simulate_ahead_time: 1.5
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.5
    behavior_plugins:
    - spin
    - backup
    - drive_on_heading
    - wait
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 15.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity:
    - 0.24
    - 0.0
    - 0.55
    min_velocity:
    - 0.0
    - 0.0
    - -0.55
    max_accel:
    - 0.22
    - 0.0
    - 0.55
    max_decel:
    - -0.35
    - 0.0
    - -0.65
    odom_topic: /odom
    odom_duration: 0.1
    deadband_velocity:
    - 0.0
    - 0.0
    - 0.0
    velocity_timeout: 1.0
collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: /cmd_vel_smoothed
    cmd_vel_out_topic: /diff_drive_controller/cmd_vel_unstamped
    transform_tolerance: 0.5
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 1.0
    polygons:
    - StopZone
    - SlowZone
    StopZone:
      type: polygon
      points:
      - 0.38
      - 0.28
      - 0.38
      - -0.28
      - -0.22
      - -0.28
      - -0.22
      - 0.28
      action_type: stop
      max_points: 5
      visualize: true
      polygon_pub_topic: polygon_stop
      enabled: true
    SlowZone:
      type: polygon
      points:
      - 0.62
      - 0.4
      - 0.62
      - -0.4
      - -0.38
      - -0.4
      - -0.38
      - 0.4
      action_type: slowdown
      max_points: 4
      slowdown_ratio: 0.55
      visualize: true
      polygon_pub_topic: polygon_slowdown
      enabled: true
    observation_sources:
    - scan
    scan:
      type: scan
      topic: /scan
      enabled: true
route_server:
  ros__parameters:
    use_sim_time: true
    route_frame: map
    graph_filepath: ''
    graph_file_loader: geojson_graph_file_loader
    graph_file_saver: geojson_graph_file_saver
    geojson_graph_file_loader:
      plugin: nav2_route::GeoJsonGraphFileLoader
    geojson_graph_file_saver:
      plugin: nav2_route::GeoJsonGraphFileSaver
    costmap_topic: global_costmap/costmap_raw
    edge_cost_functions:
    - DistanceScorer
    - PenaltyScorer
    DistanceScorer:
      plugin: nav2_route::DistanceScorer
    PenaltyScorer:
      plugin: nav2_route::PenaltyScorer
    operations:
    - AdjustSpeedLimit
    AdjustSpeedLimit:
      plugin: nav2_route::AdjustSpeedLimit
      speed_tag: speed_limit
      speed_limit_topic: speed_limit
