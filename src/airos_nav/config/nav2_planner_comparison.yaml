amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_footprint
    global_frame_id: map
    odom_frame_id: odom
    scan_topic: /scan
    robot_model_type: nav2_amcl::DifferentialMotionModel
    laser_model_type: likelihood_field
    laser_max_range: 12.0
    laser_min_range: 0.08
    max_beams: 80
    min_particles: 400
    max_particles: 1600
    update_min_d: 0.12
    update_min_a: 0.12
    transform_tolerance: 0.5

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ''

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins:
    - Smac2D
    - ThetaStar
    Smac2D:
      plugin: nav2_smac_planner/SmacPlanner2D
      tolerance: 0.25
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 100000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 1.2
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.35
        w_data: 0.25
        tolerance: 1.0e-10
    ThetaStar:
      plugin: nav2_theta_star_planner/ThetaStarPlanner
      how_many_corners: 8
      w_euc_cost: 1.0
      w_traversal_cost: 2.0
      w_heuristic_cost: 1.0
      allow_unknown: true
      use_final_approach_orientation: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      track_unknown_space: false
      footprint: '[[0.43, 0.29], [0.43, -0.29], [-0.43, -0.29], [-0.43, 0.29]]'
      plugins:
      - static_layer
      - obstacle_layer
      - inflation_layer
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan fast_lio_slam_scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_min_range: 0.08
          obstacle_max_range: 4.5
          raytrace_min_range: 0.08
          raytrace_max_range: 5.5
          max_obstacle_height: 2.0
        fast_lio_slam_scan:
          topic: /slam_scan
          data_type: LaserScan
          clearing: false
          marking: true
          obstacle_min_range: 0.08
          obstacle_max_range: 4.5
          raytrace_min_range: 0.08
          raytrace_max_range: 4.5
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.55
        cost_scaling_factor: 3.0
      always_send_full_costmap: true
